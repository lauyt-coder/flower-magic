<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 花仙子魔法占卜 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        body {
            font-family: 'DotGothic16', 'Courier New', Courier, monospace;
            background-color: #fdf5f6;
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, #fae6ea 80%);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            color: #63454e;
        }

        /* ----- 粉色古典相框設計 ----- */
        .frame-wrapper {
            position: relative;
            margin-top: 80px; 
            margin-bottom: 60px;
            filter: drop-shadow(0 15px 20px rgba(163, 124, 134, 0.15));
        }

        .pixel-frame {
            background-color: #fcf1f4;
            border: 8px solid #a37c86;
            box-shadow: 
                inset 6px 6px 0px rgba(255, 255, 255, 0.8),
                inset -6px -6px 0px rgba(163, 124, 134, 0.15),
                8px 8px 0px rgba(163, 124, 134, 0.2);
            border-radius: 4px;
            padding: 20px;
            position: relative;
        }

        .inner-dashed-frame {
            background-color: #ffffff;
            border: 4px dashed #d1a3b0;
            border-radius: 8px;
            min-height: 480px;
            position: relative;
        }

        /* 古典緞帶標題 */
        .pixel-ribbon-wrapper {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
        }
        
        .pixel-ribbon {
            background-color: #f4d8e0;
            border: 6px solid #a37c86;
            color: #63454e;
            padding: 10px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0px 6px 0px rgba(163, 124, 134, 0.3);
            position: relative;
            z-index: 10;
            white-space: nowrap;
        }

        .pixel-ribbon-tail {
            position: absolute;
            bottom: -15px;
            width: 40px;
            height: 40px;
            background-color: #e0b8c4;
            border: 6px solid #a37c86;
            z-index: 1;
        }
        .pixel-ribbon-tail.left { left: -20px; transform: rotate(15deg); }
        .pixel-ribbon-tail.right { right: -20px; transform: rotate(-15deg); }

        /* 橢圓古典畫框 (Cameo) */
        .cameo-frame {
            background-color: #fffafb;
            border: 6px solid #a37c86;
            border-radius: 50%;
            box-shadow: inset 0 0 0 6px #f4d8e0, 0 6px 0px rgba(163, 124, 134, 0.3);
            width: 200px;
            height: 240px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ----- 像素風按鈕與輸入框 ----- */
        .pixel-btn {
            background-color: #f4d8e0; 
            color: #63454e;
            border: 4px solid #a37c86;
            box-shadow: inset 2px 2px 0px #ffffff, 4px 4px 0px #a37c86;
            transition: all 0.1s;
            cursor: pointer;
            border-radius: 4px;
        }

        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: inset 2px 2px 0px #ffffff, 0px 0px 0px #a37c86;
        }

        .pixel-btn-outline {
            background-color: #ffffff;
            color: #63454e;
            border: 4px solid #d1a3b0;
            box-shadow: inset -2px -2px 0px #fcf1f4, 4px 4px 0px #d1a3b0;
            transition: all 0.1s;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pixel-btn-outline:hover {
            background-color: #fffafb;
            border-color: #a37c86;
            box-shadow: inset -2px -2px 0px #fcf1f4, 4px 4px 0px #a37c86;
        }

        .pixel-btn-outline:active {
            transform: translate(4px, 4px);
            box-shadow: inset -2px -2px 0px #fcf1f4, 0px 0px 0px #a37c86;
        }

        .pixel-input {
            background-color: #ffffff;
            border: 4px solid #a37c86;
            outline: none;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.05);
            border-radius: 4px;
            font-family: inherit;
        }

        /* 動畫 */
        .slide-in-bottom { animation: slide-in-bottom 0.5s cubic-bezier(0.250, 0.460, 0.450, 0.940) both; }
        @keyframes slide-in-bottom { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        
        .fade-in { animation: fade-in 0.8s ease-in both; }
        @keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }

        .float-anim { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        .is-hidden { display: none !important; }
        svg { image-rendering: pixelated; }
        
        /* 確保植入的圖片邊緣乾淨，且融入背景 */
        .original-img {
            image-rendering: auto; 
            mix-blend-mode: multiply; 
            border-radius: 8px; 
        }
    </style>
</head>

        function createSVG(artKey, size) {
            const lines = pixelArts[artKey];
            if (!lines) return '';
            const height = lines.length;
            const width = lines[0].length;
            let svg = `<svg viewBox="0 0 ${width} ${height}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">`;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const char = lines[y][x];
                    if (char && colors[char] && char !== ' ') {
                        svg += `<rect x="${x}" y="${y}" width="1.1" height="1.1" fill="${colors[char]}" />`; 
                    }
                }
            }
            svg += '</svg>';
            return svg;
        }

        document.querySelectorAll('.pixel-render').forEach(el => {
            el.innerHTML = createSVG(el.dataset.icon, el.dataset.size || 48);
        });

        const state = { name: '', q1: '', q2: '', q3: '', q4: '' };

        const flowers = {
            lily: {
                name: '純潔百合 (Lily)',
                meaning: '純潔、莊嚴與順利。',
                fortune: '這朵百合花帶來了優雅的香氣。今天無論遇到什麼情況，你的冷靜與智慧都能幫你化解一切危機，請保持優雅的步調前進吧！'
            },
            sunflower: {
                name: '溫暖向日葵 (Sunflower)',
                meaning: '信念、光輝與忠誠。',
                fortune: '花蕊裡藏著溫暖的陽光！今天請保持微笑，即使遇到小困難，只要心向光明，好運就會緊緊跟隨你喔！斑比為你加油！'
            },
            rose: {
                name: '浪漫玫瑰 (Pink Rose)',
                meaning: '溫柔、感動與愛的宣言。',
                fortune: '玫瑰的馨香充滿了愛的魔法。今天你可能會遇到善待你的人，或者收到小驚喜，記得用笑容回報這份溫暖喔！'
            },
            balsam: { 
                name: '熱情鳳仙花 (Balsam)',
                meaning: '熱情、好運與堅韌。',
                fortune: '這朵桃紅色的鳳仙花帶來了滿滿的活力！今天你的行動力超級強，遇到挑戰也能輕鬆跨越，大膽展現你自信迷人的一面吧！'
            }
        };

        function getEl(id) { return document.getElementById(id); }
        function hideAllScreens() { ['screen-intro', 'screen-q1', 'screen-q2', 'screen-q3', 'screen-q4', 'screen-result'].forEach(id => getEl(id).classList.add('is-hidden')); }
        function triggerAnimation(el) { el.classList.remove('is-hidden', 'slide-in-bottom'); void el.offsetWidth; el.classList.add('slide-in-bottom'); }

        function startGame() {
            const nameInput = getEl('user-name').value.trim();
            if (!nameInput) { alert('請輸入名字喔！'); return; }
            state.name = nameInput;
            document.querySelectorAll('.display-name').forEach(el => el.innerText = state.name);
            hideAllScreens(); triggerAnimation(getEl('screen-q1'));
        }

        function answerQ1(ans) { state.q1 = ans; hideAllScreens(); triggerAnimation(getEl('screen-q2')); }
        function answerQ2(ans) { state.q2 = ans; hideAllScreens(); triggerAnimation(getEl('screen-q3')); }
        function answerQ3(ans) { state.q3 = ans; hideAllScreens(); triggerAnimation(getEl('screen-q4')); }
        function answerQ4(ans) { state.q4 = ans; calculateResult(); }

        function calculateResult() {
            const scores = { lily: 0, sunflower: 0, rose: 0, balsam: 0 };
            
            scores[state.q1] += 1;
            scores[state.q2] += 2; 
            scores[state.q3] += 1;
            scores[state.q4] += 1;

            let finalFlower = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const flower = flowers[finalFlower];
            getEl('flower-name').innerText = flower.name;
            getEl('flower-meaning').innerText = flower.meaning;
            getEl('flower-fortune').innerText = flower.fortune;
            
            const resultIcon = getEl('result-icon');
            const imageFileName = `${finalFlower}.png`;

            resultIcon.innerHTML = `
                <img src="${imageFileName}" alt="${flower.name}" class="original-img" style="display:block; width: 150px; height: 150px; object-fit: contain;"
                onerror="this.outerHTML = createSVG('flower_${finalFlower}', 150);">
            `;

            hideAllScreens(); triggerAnimation(getEl('screen-result'));
        }

        function restartGame() {
            getEl('user-name').value = '';
            hideAllScreens(); triggerAnimation(getEl('screen-intro'));
        }
    </script>
